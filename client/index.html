<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />

  <!-- Preload Critical Assets -->
  <link rel="preload" href="/logo.png" as="image" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" as="style" />
  <link rel="shortcut icon" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description"
    content="PalNovaa (بالنوفا) | شبكة اجتماعية ذكية تتيح لك اكتشاف الأماكن القريبة، مشاركة لحظاتك الاجتماعية، والتواصل مع الأصدقاء بسهولة وأمان." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PalNovaa" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="PalNovaa" />
  <meta name="msapplication-navbutton-color" content="#0f172a" />
  <meta name="apple-touch-fullscreen" content="yes" />
  
  <script>
    // منع ميزة "السحب للتحديث" (Pull-to-refresh) التي تخرب تجربة التطبيق
    document.addEventListener('touchmove', function (e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>

  <link rel="manifest" href="/manifest.json" />
  <title>PalNovaa | خريطتك الاجتماعية</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Exo+2:wght@800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-0: #0a1226;
      --bg-1: #0f172a;
      --bg-2: #152043;
      --amber: #fbab15;
      --amber-soft: #ffd27a;
      --ink: #f8fafc;
      --ink-dim: rgba(248, 250, 252, .6);
      --grid: rgba(251, 171, 21, .07);
      --ring: rgba(251, 171, 21, .22);
    }

    * { box-sizing: border-box; }

    /* ============ Splash Screen ============ */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% 20%, #1a2554 0%, transparent 60%),
        radial-gradient(140% 100% at 50% 110%, rgba(251, 171, 21, .18) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, #060a18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      isolation: isolate;
      transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
    }

    #splash-screen.fade-out {
      opacity: 0;
      transform: scale(1.05);
      filter: blur(15px);
      pointer-events: none;
    }

    /* subtle map grid */
    .map-grid {
      position: absolute;
      inset: -10%;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 38px 38px, 38px 38px;
      mask-image: radial-gradient(circle at 50% 45%, black 10%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 50% 45%, black 10%, transparent 70%);
      transform: perspective(900px) rotateX(58deg) translateY(8%) scale(1.4);
      transform-origin: 50% 60%;
      opacity: .9;
      animation: gridDrift 24s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 76px, 76px 0; }
    }

    /* ambient amber glow under pin */
    .ambient-glow {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 420px;
      height: 420px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(251, 171, 21, .35) 0%, rgba(251, 171, 21, 0) 60%);
      filter: blur(8px);
      z-index: 0;
      animation: ambientPulse 7s cubic-bezier(.45, .05, .55, .95) infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: .5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: .85; transform: translate(-50%, -50%) scale(1.08); }
    }

    /* ripples */
    .ripples {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 0;
      height: 0;
      z-index: 1;
    }

    .ripple {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 60px;
      height: 60px;
      border: 1.5px solid var(--ring);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.2);
      opacity: 0;
      animation: rippleOut 5s cubic-bezier(.22, .61, .36, 1) infinite;
    }

    .ripple:nth-child(2) { animation-delay: 1.66s; }
    .ripple:nth-child(3) { animation-delay: 3.33s; }

    @keyframes rippleOut {
      0% { transform: translate(-50%, -50%) scale(.15); opacity: 0; }
      8% { opacity: .9; }
      100% { transform: translate(-50%, -50%) scale(7); opacity: 0; border-color: rgba(251, 171, 21, .0); }
    }

    /* logo content */
    .splash-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-2%);
    }

    .logo-box {
      position: relative;
      width: 128px;
      height: 128px;
      display: grid;
      place-items: center;
      /* Entrace animation removed as requested - elements appear immediately */
      animation: pinBob 6s cubic-bezier(.45, .05, .55, .95) infinite;
    }

    @keyframes pinBob {
      0%, 100% { transform: translateY(0) }
      50% { transform: translateY(-5px) }
    }

    .logo-tile {
      position: relative;
      width: 104px;
      height: 104px;
      border-radius: 26px;
      background:
        radial-gradient(120% 100% at 30% 20%, #ffc857 0%, var(--amber) 55%, #e08e00 100%);
      box-shadow:
        0 18px 40px -10px rgba(251, 171, 21, .55),
        inset 0 0 0 1px rgba(255, 255, 255, .18),
        inset 0 -10px 20px rgba(0, 0, 0, .15);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .logo-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255, 255, 255, .35) 0%, rgba(255, 255, 255, 0) 45%);
      mix-blend-mode: overlay;
    }

    .logo-tile svg {
      width: 54%;
      height: 54%;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .18));
    }

    /* orbital ring */
    .orbit {
      position: absolute;
      inset: -14px;
      border-radius: 34px;
      border: 1.5px dashed rgba(251, 171, 21, .35);
      animation: orbit 32s linear infinite;
    }

    @keyframes orbit { to { transform: rotate(360deg); } }

    /* pin shadow */
    .pin-shadow {
      position: absolute;
      left: 50%;
      top: calc(46% + 84px);
      width: 140px;
      height: 18px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, .55), transparent 70%);
      filter: blur(2px);
      z-index: 2;
      animation: shadowPulse 6s cubic-bezier(.45, .05, .55, .95) infinite;
    }

    @keyframes shadowPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .7; }
      50% { transform: translate(-50%, -50%) scale(.85); opacity: .5; }
    }

    /* text */
    .splash-text-container {
      margin-top: 5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      /* Entrace animation removed - appears immediately */
    }

    .splash-title {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 8vw, 48px);
      letter-spacing: -.5px;
      background: linear-gradient(135deg, #ffffff 0%, #ffe2a8 45%, #fbab15 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 30px rgba(251, 171, 21, .25);
      text-align: center;
    }

    .splash-tagline {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink-dim);
      letter-spacing: .2px;
    }

    .splash-tagline .accent { color: var(--amber-soft); }

    .social-loader {
      margin-top: 34px;
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 10px rgba(251, 171, 21, .7);
      animation: dotBounce 1.8s cubic-bezier(.45, .05, .55, .95) infinite;
    }

    .dot:nth-child(1) { animation-delay: -.32s }
    .dot:nth-child(2) { animation-delay: -.16s }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(.5); opacity: .4 }
      40% { transform: scale(1); opacity: 1 }
    }

    /* footer */
    .splash-footer {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Tajawal', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .6px;
      color: rgba(248, 250, 252, .32);
      z-index: 3;
    }

    .splash-footer .amp { color: rgba(251, 171, 21, .7); margin: 0 2px; font-weight: 400; }

    /* tiny floating particles */
    .particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
      box-shadow: 0 0 8px var(--amber);
      animation: floatUp 9s cubic-bezier(.4, .0, .6, 1) infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(20px) scale(.3); opacity: 0; }
      25% { opacity: .85; }
      75% { opacity: .7; }
      100% { transform: translateY(-420px) scale(.9); opacity: 0; }
    }

    body.splash-active {
      overflow: hidden;
      background: var(--bg-0);
      margin: 0;
      height: 100vh;
      height: 100dvh;
    }
  </style>

  <!-- GUARANTEED Splash Screen Removal (runs before React) -->
  <script>
    (function() {
      function hideSplash() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.transition = 'opacity 0.5s ease';
          splash.style.opacity = '0';
          splash.style.pointerEvents = 'none';
          setTimeout(function() {
            splash.style.display = 'none';
            document.body.classList.remove('splash-active');
          }, 500);
        }
      }
      setTimeout(hideSplash, 10000); // 10s Safety Timeout
    })();
  </script>
</head>

<body class="splash-active">
  <div id="splash-screen">
    <div class="map-grid"></div>
    <div class="ambient-glow"></div>
    <div class="particles" id="particles"></div>

    <div class="ripples">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>

    <div class="pin-shadow"></div>

    <div class="splash-content">
      <div class="logo-box">
        <div class="orbit"></div>
        <div class="logo-tile">
          <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="PalNovaa">
            <path d="M32 2C16.536 2 4 14.536 4 30c0 19 22 44 26.2 48.2a2.55 2.55 0 0 0 3.6 0C38 74 60 49 60 30 60 14.536 47.464 2 32 2Z" fill="#fff"/>
            <circle cx="32" cy="29" r="11" fill="#fbab15"/>
          </svg>
        </div>
      </div>

      <div class="splash-text-container">
        <h1 class="splash-title">PalNovaa</h1>
        <div class="splash-tagline">اكتشف عالمك <span class="accent">الاجتماعي</span> الجديد</div>
      </div>

      <div class="social-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="splash-footer">Built by Mohammed Housheya <span class="amp">&amp;</span> Momen Kalefh</div>
  </div>

  <div id="root"></div>

  <script>
    (function(){
      const wrap = document.getElementById('particles');
      function spawn(){
        if(!wrap) return;
        wrap.innerHTML = '';
        for(let i=0; i<14; i++){
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = (10 + Math.random()*80) + '%';
          p.style.top  = (50 + Math.random()*40) + '%';
          p.style.animationDelay = (Math.random()*9) + 's';
          p.style.animationDuration = (8 + Math.random()*4) + 's';
          wrap.appendChild(p);
        }
      }
      spawn();
    })();
  </script>

  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    window.addEventListener('error', (e) => {
      if (e.message && (e.message.includes('Failed to fetch dynamically imported module') || e.message.includes('Importing a module script failed'))) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) { registration.unregister(); }
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => { console.log('✅ SW registered'); })
          .catch(error => { console.log('❌ SW failed:', error); });
      });
    }
  </script>
</body>

</html>
