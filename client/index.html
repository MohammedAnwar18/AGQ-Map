<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />

  <!-- Preload Critical Assets -->
  <link rel="preload" href="/logo.png" as="image" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" as="style" />
  <link rel="shortcut icon" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description"
    content="PalNovaa (بالنوفا) | شبكة اجتماعية مكانية ذكية تتيح لك اكتشاف الأماكن القريبة، مشاركة لحظاتك على الخريطة، والتواصل مع الأصدقاء بسهولة وأمان." />
  <meta name="theme-color" content="#0f172a" />

  <!-- Mobile App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PalNovaa" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="/manifest.json" />
  <title>PalNovaa | خريطتك الاجتماعية</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* Premium Social Media Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      overflow: hidden;
      transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* Ambient Background Animated Glow */
    #splash-screen::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at center, rgba(251, 171, 21, 0.08) 0%, transparent 70%);
      animation: ambient-pulse 8s infinite alternate ease-in-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      transform: scale(1.1);
      filter: blur(20px);
      pointer-events: none;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo-box {
      position: relative;
      animation: logo-entrance 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .splash-logo {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 50%;
      filter: drop-shadow(0 0 25px rgba(251, 171, 21, 0.4));
      border: 3px solid rgba(251, 171, 21, 0.3);
    }

    .logo-ring {
      position: absolute;
      inset: -15px;
      border: 2px solid rgba(251, 171, 21, 0.2);
      border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%;
      animation: ring-rotate 10s linear infinite;
    }

    .splash-text-container {
      text-align: center;
      animation: text-reveal 1s ease-out 0.4s both;
    }

    .splash-title {
      font-family: 'Tajawal', sans-serif;
      font-size: 32px;
      font-weight: 900;
      margin: 0;
      background: linear-gradient(135deg, #ffffff 0%, #fbab15 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .splash-tagline {
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    /* Modern Minimal Loader */
    .social-loader {
      margin-top: 40px;
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #fbab15;
      border-radius: 50%;
      animation: dot-bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    .splash-footer {
      position: absolute;
      bottom: 60px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Keyframes */
    @keyframes ambient-pulse {
      0% {
        transform: translate(-10%, -10%) scale(1);
      }

      100% {
        transform: translate(10%, 10%) scale(1.2);
      }
    }

    @keyframes logo-entrance {
      0% {
        transform: scale(0.5) translateY(20px);
        opacity: 0;
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes ring-rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes text-reveal {
      from {
        transform: translateY(15px);
        opacity: 0;
        filter: blur(10px);
      }

      to {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes dot-bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1.0);
      }
    }

    body.splash-active {
      overflow: hidden;
      background: #0f172a;
    }
  </style>
</head>

<body class="splash-active">
  <!-- Premium Social Gateway Splash -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="logo-box">
        <div class="logo-ring"></div>
        <img src="/logo.png" alt="PalNovaa" class="splash-logo" />
      </div>

      <div class="splash-text-container">
        <h1 class="splash-title">PalNovaa</h1>
        <div class="splash-tagline">اكتشف عالمك الاجتماعي الجديد</div>
      </div>

      <div class="social-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    <!-- Footer removed per user request -->
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
