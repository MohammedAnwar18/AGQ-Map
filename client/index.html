  <style>
    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: splash-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(251, 171, 21, 0.15));
    }

    .splash-title {
      margin-top: 20px;
      font-family: 'Tajawal', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #333;
      letter-spacing: 1px;
    }

    .splash-loader {
      margin-top: 50px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(251, 171, 21, 0.1);
      border-top: 3px solid #fbab15;
      border-radius: 50%;
      animation: splash-spin 1s linear infinite;
    }

    .splash-footer {
      position: absolute;
      bottom: 40px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      color: #999;
    }

    @keyframes splash-pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes splash-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Prevent scrolling while splash is active */
    body.splash-active {
      overflow: hidden;
      height: 100vh;
    }
  </style>
</head>

<body class="splash-active">
  <!-- Splash Screen / Native Loader -->
  <div id="splash-screen">
    <div class="splash-logo-container">
      <img src="/logo.png" alt="PalNovaa Logo" class="splash-logo" />
      <h1 class="splash-title">PalNovaa</h1>
      <div class="splash-loader"></div>
    </div>
    <div class="splash-footer">منصتك الاجتماعية الذكية</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
