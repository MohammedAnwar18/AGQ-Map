<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الموقع الجغرافي الذكي - PalNovaa Offline GPS</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts (Outfit & Tajawal) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; /* Indigo */
            --secondary: #ec4899; /* Pink */
            --success: #10b981; /* Green */
            --warning: #f59e0b; /* Orange */
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fullscreen Map */
        #map {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Sleek Dark Mode Filter for Leaflet Map Tiles */
        .leaflet-tile {
            filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) !important;
        }

        /* Header Styling */
        header {
            position: absolute;
            top: 20px;
            right: 20px;
            left: 20px;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-section h1 {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--warning);
            display: inline-block;
        }

        .status-dot.online {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-dot 1.5s infinite;
        }

        .status-dot.offline {
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        /* Dashboard HUD */
        .dashboard-hud {
            position: absolute;
            bottom: 30px;
            right: 20px;
            left: 20px;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            transition: all 0.3s ease;
        }

        .hud-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .hud-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .hud-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-light);
            font-family: 'Outfit', 'Tajawal', sans-serif;
        }

        /* Floating Buttons Control */
        .controls-group {
            position: absolute;
            bottom: 220px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .circle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s ease;
        }

        .circle-btn:hover {
            transform: scale(1.05);
            background: #4f46e5;
        }

        .circle-btn.sec-btn {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .circle-btn.sec-btn:hover {
            background: rgba(30, 41, 59, 0.9);
        }

        /* Pulse animation for the user's custom marker */
        .user-marker-icon {
            position: relative;
        }
        
        .pulse-ring {
            border: 3px solid var(--primary);
            border-radius: 30px;
            height: 36px;
            width: 36px;
            position: absolute;
            left: -10px;
            top: -10px;
            animation: pulse-ring-anim 1.8s ease-out infinite;
            opacity: 0;
        }

        .pulse-dot-center {
            background-color: var(--primary);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        @keyframes pulse-ring-anim {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }

        /* Direction and speed alert styling */
        .gps-alert {
            grid-column: 1 / -1;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            color: #a5b4fc;
        }

        /* Hide leaflet default controls style slightly to fit layout */
        .leaflet-control-zoom {
            border: 1px solid var(--glass-border) !important;
            box-shadow: none !important;
        }
        .leaflet-bar a {
            background-color: var(--glass-bg) !important;
            color: var(--text-light) !important;
            border-bottom: 1px solid var(--glass-border) !important;
        }
    </style>
</head>
<body>

    <!-- Header info -->
    <header>
        <div class="logo-section">
            <h1>📍 PalNovaa <span style="font-weight: 300; font-size: 14px;">مستكشف GPS بدون إنترنت</span></h1>
        </div>
        <div class="status-badge" id="net-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">جاري فحص الاتصال...</span>
        </div>
    </header>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Floating Buttons Control -->
    <div class="controls-group">
        <!-- Re-center button -->
        <button class="circle-btn" id="btn-center" title="تركيز الموقع">🎯</button>
        <!-- Clear Cache and Refresh -->
        <button class="circle-btn sec-btn" id="btn-clear-cache" title="تحديث الخريطة ومسح الكاش">🔄</button>
    </div>

    <!-- Dashboard HUD -->
    <div class="dashboard-hud">
        <div class="hud-card">
            <div class="hud-label">دائرة العرض (Lat)</div>
            <div class="hud-value" id="val-lat">--</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">خط الطول (Lon)</div>
            <div class="hud-value" id="val-lon">--</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">الدقة (Accuracy)</div>
            <div class="hud-value" id="val-accuracy">--</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">السرعة (Speed)</div>
            <div class="hud-value" id="val-speed">0 كم/س</div>
        </div>
        <div class="gps-alert" id="gps-status-bar">
            جاري البحث عن إشارات الأقمار الصناعية (GPS)... الرجاء التأكد من تفعيل الموقع.
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 1. Initial State & Map Setup ---
        // Jerusalem default coordinates
        let defaultCoords = [31.7683, 35.2137];
        let map = L.map('map', {
            zoomControl: true
        }).setView(defaultCoords, 13);

        // Load OpenStreetMap tiles. They will be cached by sw.js!
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Relocate zoom control to top-right
        map.zoomControl.setPosition('topright');

        // Create Custom Pulser Icon for User Location
        const customPulserIcon = L.divIcon({
            className: 'user-marker-icon',
            html: '<div class="pulse-ring"></div><div class="pulse-dot-center"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        let userMarker = null;
        let accuracyCircle = null;
        let lastPosition = null;

        // --- 2. Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered successfully: ', reg.scope))
                    .catch(err => console.error('Service Worker registration failed: ', err));
            });
        }

        // --- 3. Online/Offline Detector ---
        function updateNetworkStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const isOnline = navigator.onLine;

            if (isOnline) {
                dot.className = "status-dot online";
                text.textContent = "متصل بالإنترنت";
            } else {
                dot.className = "status-dot offline";
                text.textContent = "يعمل بدون إنترنت (أوفلاين)";
            }
        }
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();

        // --- 4. GPS Geolocation Tracking Logic ---
        const valLat = document.getElementById('val-lat');
        const valLon = document.getElementById('val-lon');
        const valAccuracy = document.getElementById('val-accuracy');
        const valSpeed = document.getElementById('val-speed');
        const gpsStatusBar = document.getElementById('gps-status-bar');

        function onLocationSuccess(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const accuracy = position.coords.accuracy; // in meters
            const speed = position.coords.speed;       // in m/s
            
            lastPosition = [lat, lon];

            // Update UI dashboard values
            valLat.textContent = lat.toFixed(5);
            valLon.textContent = lon.toFixed(5);
            valAccuracy.textContent = `± ${accuracy.toFixed(1)} م`;
            
            // Speed conversion (m/s to km/h)
            if (speed !== null && speed !== undefined && speed > 0) {
                const speedKmh = (speed * 3.6).toFixed(1);
                valSpeed.textContent = `${speedKmh} كم/س`;
            } else {
                valSpeed.textContent = `0 كم/س`;
            }

            gpsStatusBar.innerHTML = `🟢 إشارة GPS قوية ونشطة (تحديث حي). دقة التحديد: ± ${accuracy.toFixed(1)} متر.`;
            gpsStatusBar.style.color = '#10b981';
            gpsStatusBar.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';

            // Update Map Marker and Accuracy Circle
            if (userMarker) {
                userMarker.setLatLng(lastPosition);
            } else {
                userMarker = L.marker(lastPosition, { icon: customPulserIcon }).addTo(map);
                // Center map on user coordinates for first detection
                map.flyTo(lastPosition, 16, { duration: 1.5 });
            }

            if (accuracyCircle) {
                accuracyCircle.setLatLng(lastPosition).setRadius(accuracy);
            } else {
                accuracyCircle = L.circle(lastPosition, {
                    radius: accuracy,
                    color: '#6366f1',
                    fillColor: '#6366f1',
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(map);
            }
        }

        function onLocationError(error) {
            console.error("GPS Error: ", error);
            let errorMessage = "تعذر تحديد الموقع الجغرافي.";
            
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage = "❌ تم رفض إذن الوصول للموقع. يرجى تفعيل الـ GPS والسماح للمتصفح بالوصول.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage = "⚠️ إشارة الموقع غير متوفرة (قد تكون داخل مبنى مغلق).";
                    break;
                case error.TIMEOUT:
                    errorMessage = "⏳ انتهت مهلة البحث عن إشارة GPS. جاري إعادة المحاولة...";
                    break;
            }
            
            gpsStatusBar.textContent = errorMessage;
            gpsStatusBar.style.color = '#f87171';
            gpsStatusBar.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
        }

        // Configuration options for maximum hardware precision (GPS)
        const geoOptions = {
            enableHighAccuracy: true, // تفعيل مستشعر GPS الفعلي بدقة
            timeout: 10000,           // أقصى مدة للانتظار
            maximumAge: 0             // جلب موقع جديد دائماً بدون كاش قديم
        };

        // Start Watching continuous location
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, geoOptions);
        } else {
            gpsStatusBar.textContent = "❌ جهازك لا يدعم تحديد الموقع (Geolocation API).";
        }

        // --- 5. Button Actions ---
        // Center Map on User Click
        document.getElementById('btn-center').addEventListener('click', () => {
            if (lastPosition) {
                map.flyTo(lastPosition, 17, { duration: 1.2 });
            } else {
                alert("جاري جلب إحداثيات موقعك حالياً، يرجى الانتظار ثانية.");
            }
        });

        // Clear Cache and Hard Refresh
        document.getElementById('btn-clear-cache').addEventListener('click', () => {
            if (confirm("هل تريد مسح ملفات الخريطة المخزنة وإعادة التحميل لتحديث البيانات؟")) {
                caches.keys().then(names => {
                    for (let name of names) {
                        caches.delete(name);
                    }
                }).then(() => {
                    location.reload(true);
                });
            }
        });

    </script>
</body>
</html>
